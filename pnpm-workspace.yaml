packages:
  - 'packages/*'

onlyBuiltDependencies:
  - '@clerk/shared'
  - '@prisma/client'
  - '@prisma/engines'
  - '@tailwindcss/oxide'
  - core-js-pure
  - electron
  - electron-winstaller
  - esbuild
  - msw
  - prisma
  - sharp
  - unrs-resolver

patchedDependencies: {}

nodeLinker: hoisted

# Supply-chain security (migrated from .npmrc 2026-05-07)
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - next
  - react
  - react-dom
  - '@types/react'
  - '@types/react-dom'
  - typescript
  - vite
  - vitest
  - '@vitejs/plugin-react'
  - eslint
  - prettier
  - tailwindcss
  - '@tanstack/react-query'
  - zod
  - react-hook-form
  - eslint-config-ts-prefixer
  - '@laststance/redux-storage-middleware'
  - '@laststance/react-next-eslint-plugin'
verifyStoreIntegrity: true
