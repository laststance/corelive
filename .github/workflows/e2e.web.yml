name: E2E Tests (Web)

on:
  pull_request:
    # Skip docs-only PRs — full E2E matrix takes ~15 min and gains nothing
    # from a README typo.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: e2e-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------------
  # detect-specs
  # ----------------------------------------------------------------------------
  # Auto-discovers every `e2e/web/*.spec.ts` file and emits the basenames as a
  # JSON array (e.g. `["category","qa-fixes",...]`). The downstream `e2e-web`
  # job consumes this array via `fromJson(...)` to fan out one runner per spec
  # file. Adding or removing a spec file requires no workflow edits — the
  # matrix size auto-adjusts on the next CI run.
  #
  # Why per-file (not Playwright `--shard=N/M`):
  #   - `playwright.config.ts` forces `workers: 1` due to shared Clerk user +
  #     PostgreSQL state, so `--shard` would only split tests across shards
  #     while still serializing within each shard. Per-file runners give true
  #     parallelism because each runner gets its own Postgres + Next.js.
  #   - Each spec already calls `test.beforeAll(resetDatabase)`, so isolated
  #     databases per runner are the natural unit of work.
  detect-specs:
    name: Detect spec files 🔍
    runs-on: ubuntu-latest
    outputs:
      specs: ${{ steps.list.outputs.specs }}
      total: ${{ steps.list.outputs.total }}
    steps:
      - name: Checkout repository 🔄
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enumerate e2e/web/*.spec.ts
        id: list
        run: |
          # `find` produces newline-separated paths; `basename ... .spec.ts`
          # strips both the directory and the `.spec.ts` suffix so the matrix
          # value is a clean spec name (e.g. `category`). `jq -R . | jq -sc .`
          # turns the newline list into a compact JSON array.
          specs=$(find e2e/web -maxdepth 1 -name '*.spec.ts' -type f \
            -exec basename {} .spec.ts \; | sort | jq -R . | jq -sc .)
          total=$(echo "$specs" | jq 'length')
          echo "specs=$specs" >> "$GITHUB_OUTPUT"
          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "Discovered $total spec file(s): $specs"

  # ----------------------------------------------------------------------------
  # e2e-web
  # ----------------------------------------------------------------------------
  # Runs ONE Playwright invocation per spec file in parallel. Each matrix job
  # is a fresh ubuntu-latest runner with its own Postgres + Next.js process,
  # so there is no shared-state contention between specs. `fail-fast: false`
  # keeps every shard running even if one fails — we want the full picture
  # for triage, not an early abort.
  e2e-web:
    name: E2E Web (${{ matrix.spec }}) 🧪
    needs: detect-specs
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        spec: ${{ fromJson(needs.detect-specs.outputs.specs) }}

    steps:
      - name: Checkout repository 🔄
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use shared prepare action 🔧
        uses: ./.github/actions/prepare

      # Pipe each secret through an `env:` block (rather than interpolating
      # `${{ secrets.X }}` directly into `run:`) so values containing
      # newlines or shell metacharacters cannot inject extra `.env` lines.
      # See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
      - name: Set environment variables
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          E2E_CLERK_USER_USERNAME: ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
        run: |
          {
            printf 'NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=%s\n' "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            printf 'NEXT_PUBLIC_CLERK_SIGN_IN_URL=/login\n'
            printf 'NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up\n'
            printf 'NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL=/home\n'
            printf 'CLERK_SECRET_KEY=%s\n' "$CLERK_SECRET_KEY"
            printf 'WEBHOOK_SECRET=%s\n' "$WEBHOOK_SECRET"
            printf 'POSTGRES_PRISMA_URL=%s\n' 'postgresql://postgres:password@localhost:5432/corelive?schema=public'
            printf 'E2E_CLERK_USER_USERNAME=%s\n' "$E2E_CLERK_USER_USERNAME"
            printf 'E2E_CLERK_USER_PASSWORD=%s\n' "$E2E_CLERK_USER_PASSWORD"
            printf 'E2E_CLERK_USER_EMAIL=%s\n' "$E2E_CLERK_USER_EMAIL"
          } > .env

      - name: Start Postgres via Docker Compose 🐳
        run: |
          # `--wait` blocks until the container's healthcheck passes, and
          # the next "Verify database connection" step re-polls anyway.
          docker compose -f compose.yml -p corelive up -d postgres --wait
          docker ps -a

      - name: Show Postgres logs on failure 🪵
        if: failure()
        run: |
          docker compose -f compose.yml -p corelive logs postgres | tail -n 200 || true

      - name: Verify database connection 🧪
        run: |
          # Wait for database to be created and ready
          timeout 60 bash -c 'until docker compose -f compose.yml -p corelive exec postgres env PGPASSWORD=password psql -U postgres -lqt | cut -d \| -f 1 | grep -qw corelive; do sleep 2; done'
          echo "Database 'corelive' exists and is ready!"

      - name: Run Prisma migrations 📦
        run: pnpm prisma migrate deploy

      - name: Generate Prisma Client 🗄️
        run: pnpm prisma generate

      - name: Build Next.js application 🏗️
        run: pnpm build

      - name: Install Playwright Browsers 🎭
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Web Playwright tests 🧪
        env:
          E2E_TEST_MODE: 'true'
          # Each matrix runner executes exactly ONE spec file, so
          # `e2e/global-setup.ts`'s up-front `pnpm db:reset` is already enough
          # — the per-spec `test.beforeAll(resetDatabase)` would just repeat
          # the same migrate+seed (~5-10s wasted). `resetDatabase` early-
          # returns when this var is set; see `e2e/web/_helpers/db.ts`.
          E2E_SKIP_PER_SPEC_RESET: 'true'
          # Pipe `matrix.spec` through an env var (rather than interpolating
          # `${{ matrix.spec }}` directly into `run:`) so a hypothetical
          # filename containing shell metacharacters (`$()`, backticks, `;`)
          # cannot inject into the rendered bash. GHA expands `${{ ... }}`
          # at template time, BEFORE bash escaping; env-var consumption via
          # `"${SPEC}"` keeps the value as a single literal argument.
          # See https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          SPEC: ${{ matrix.spec }}
        # The `setup` project (auth.setup.ts) auto-runs because the `web`
        # project declares `dependencies: ['setup']` — file-path filters do
        # NOT skip dependency projects. Verified via `playwright test --list`.
        run: pnpm exec playwright test --project=web "e2e/web/${SPEC}.spec.ts"

      - name: Upload Blob Report 🧊
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          # Each spec gets its own blob artifact so `merge-reports` can fan
          # them back into a single HTML report. The pattern `blob-report-*`
          # is what the merge job globs for.
          name: blob-report-${{ matrix.spec }}
          path: blob-report/
          retention-days: 1

      - name: Upload Test Results 📋
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          # Only upload on failure — test-results/ holds traces, screenshots,
          # and videos that bloat artifact storage when every shard ships
          # them on success. Keep them 30 days for triage.
          name: test-results-${{ matrix.spec }}
          path: test-results/
          retention-days: 30

  # ----------------------------------------------------------------------------
  # merge-reports
  # ----------------------------------------------------------------------------
  # Combines every shard's blob report into a single browsable HTML report.
  # Runs even if some shards failed (`if: !cancelled()`), so the merged
  # report still shows passing + failing tests across the whole suite.
  merge-reports:
    name: Merge reports 📊
    if: ${{ !cancelled() }}
    needs: e2e-web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository 🔄
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use shared prepare action 🔧
        uses: ./.github/actions/prepare

      - name: Download blob reports
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          # `merge-multiple: true` flattens every `blob-report-*` artifact
          # into the same `all-blob-reports/` directory. Blob filenames
          # already encode the shard identity, so no name collisions.
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: pnpm exec playwright merge-reports --reporter html ./all-blob-reports

      - name: Upload HTML report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          # Suffix with `attempt-N` so re-runs don't overwrite prior reports
          # in the same workflow run.
          name: playwright-report-web--attempt-${{ github.run_attempt }}
          path: playwright-report/
          retention-days: 30
