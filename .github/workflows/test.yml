name: Test
on:
  pull_request: ~
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/prepare
      - name: Set environment variables
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${{ secrets.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${{ secrets.NEXT_PUBLIC_CLERK_SIGN_UP_URL }}
          NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL: ${{ secrets.NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          {
            printf 'NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=%s\n' "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
            printf 'NEXT_PUBLIC_CLERK_SIGN_IN_URL=%s\n' "$NEXT_PUBLIC_CLERK_SIGN_IN_URL"
            printf 'NEXT_PUBLIC_CLERK_SIGN_UP_URL=%s\n' "$NEXT_PUBLIC_CLERK_SIGN_UP_URL"
            printf 'NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL=%s\n' "$NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL"
            printf 'CLERK_SECRET_KEY=%s\n' "$CLERK_SECRET_KEY"
            printf 'WEBHOOK_SECRET=%s\n' "$WEBHOOK_SECRET"
            printf 'POSTGRES_PRISMA_URL=%s\n' 'postgresql://postgres:password@localhost:5491/corelive?schema=public'
          } > .env
      # Provision Postgres for the real-DB integration suites (paste-import
      # procedures). Mirrors e2e.web.yml. Those tests are gated behind
      # RUN_DB_INTEGRATION_TESTS (set on the unit-test step below); mocked/pure
      # unit tests are unaffected.
      - name: Start Postgres via Docker Compose 🐳
        run: |
          docker compose -f compose.yml -p corelive up -d postgres --wait
          docker ps -a
      - name: Show Postgres logs on failure 🪵
        if: failure()
        run: docker compose -f compose.yml -p corelive logs postgres | tail -n 200 || true
      - name: Verify database connection 🧪
        run: |
          timeout 60 bash -c 'until docker compose -f compose.yml -p corelive exec postgres env PGPASSWORD=password psql -U postgres -lqt | cut -d \| -f 1 | grep -qw corelive; do sleep 2; done'
          echo "Database 'corelive' exists and is ready!"
      - name: Run Prisma migrations 📦
        run: pnpm prisma migrate deploy
      - name: Generate Prisma Client 🗄️
        run: pnpm prisma generate
      - name: Install Playwright Browsers 🎭
        run: pnpm exec playwright install --with-deps chromium
      - name: Generate Icons 🎨
        run: pnpm build:icons
      # Coverage now lives in the dedicated `coverage.yml` workflow (#127): it
      # measures unit + web E2E and uploads ONE merged report to Codecov. This
      # gate stays coverage-free and fast — its old `--coverage` + Codecov step
      # uploaded `./coverage/lcov.info`, which the Phase 0 vitest config no longer
      # emits (it writes `coverage/unit-web/`), so the upload silently matched
      # nothing. Dropped here rather than repointed, to keep one Codecov source.
      - name: Run unit tests
        env:
          RUN_DB_INTEGRATION_TESTS: '1'
        run: pnpm test --run
      - name: Run workspace package tests
        run: pnpm test:packages
      - name: Verify generated theme CSS is not stale
        run: pnpm theme:check
      - name: Run Electron tests
        run: pnpm test:electron --run
